name: Build & Release Koto

# ─── 触发条件 ───────────────────────────────────────────────────────────────
# 1. 推送版本标签（如 v1.2.0）→ 自动构建 + 创建 GitHub Release
# 2. 手动触发（workflow_dispatch） → 只构建 + 上传 artifact，不发布 Release
on:
  push:
    tags:
      - 'v[0-9]*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.2.0）。留空则读 VERSION 文件'
        required: false
        default: ''

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  # Job 1: Windows 桌面版构建（PyInstaller + Inno Setup）
  # ══════════════════════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows Package
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Determine version
        shell: pwsh
        run: |
          if ("${{ github.event_name }}" -eq "push") {
            $v = "${{ github.ref_name }}" -replace '^v', ''
          } elseif ("${{ github.event.inputs.version }}" -ne "") {
            $v = "${{ github.event.inputs.version }}"
          } else {
            $v = (Get-Content VERSION -Raw -ErrorAction SilentlyContinue).Trim()
            if (-not $v) { $v = Get-Date -Format "yyyy.MM.dd" }
          }
          "VERSION=$v" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          Write-Host "Building Koto version: $v"

      - name: Cache pip
        uses: actions/cache@v5
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\pip install --upgrade pip wheel
          .\.venv\Scripts\pip install pyinstaller

          # Read with explicit UTF-8 (requirements.txt has Chinese comments)
          $reqContent = Get-Content config\requirements.txt -Encoding UTF8
          $coreReqs = $reqContent | ForEach-Object {
            # Strip inline comments so pip doesn't choke on Chinese chars
            ($_ -split '#')[0].Trim()
          } | Where-Object {
            $_ -ne '' -and
            $_ -notmatch 'PyAudio' -and
            $_ -notmatch 'SpeechRecognition' -and
            $_ -notmatch 'vosk' -and
            $_ -notmatch 'edge.tts' -and
            $_ -notmatch 'sounddevice' -and
            $_ -notmatch 'faster.whisper' -and
            $_ -notmatch 'openai.whisper' -and
            $_ -notmatch 'gunicorn'
          }
          $coreReqs | Set-Content .venv\core_reqs.txt -Encoding ascii
          Write-Host "Installing $(($coreReqs | Measure-Object).Count) packages..."
          .\.venv\Scripts\pip install -r .venv\core_reqs.txt
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::pip install failed"; exit 1 }

          .\.venv\Scripts\pip install PyAudio
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::warning::PyAudio install failed, voice will degrade at runtime"
          }
          Write-Host "Dependencies installed"

      - name: Build with PyInstaller
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path logs | Out-Null
          .\.venv\Scripts\pyinstaller.exe koto.spec --clean -y *> logs\build_latest.log
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::PyInstaller build failed. Last 60 lines:"
            Get-Content logs\build_latest.log -Tail 60
            exit 1
          }
          $exeMB = [math]::Round((Get-Item dist\Koto\Koto.exe).Length / 1MB, 1)
          Write-Host "Build OK -> dist\Koto\Koto.exe ($exeMB MB)"

      - name: Smoke-test built EXE (file existence check)
        shell: pwsh
        run: |
          $internal = "dist\Koto\_internal"
          $checks = @(
            "dist\Koto\Koto.exe",
            "$internal\base_library.zip",
            "$internal\psutil",
            "$internal\app",
            "$internal\web",
            "$internal\config"
          )
          $failed = @()
          foreach ($p in $checks) {
            if (Test-Path $p) { Write-Host "  OK: $p" }
            else              { $failed += $p; Write-Host "::error::MISSING: $p" }
          }
          # Also verify psutil .pyd is present (the C extension that was missing in v1.0.2)
          $pyd = Get-ChildItem "$internal\psutil" -Filter "_psutil_windows*.pyd" -ErrorAction SilentlyContinue
          if ($pyd) { Write-Host "  OK: psutil C extension: $($pyd.Name)" }
          else       { $failed += "psutil/_psutil_windows.pyd"; Write-Host "::error::MISSING: psutil C extension .pyd" }
          if ($failed.Count -gt 0) {
            Write-Host "::error::Smoke test failed: $($failed.Count) item(s) missing"
            exit 1
          }
          Write-Host "Smoke test passed: all critical bundle files present"

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: build-log
          path: logs\build_latest.log
          retention-days: 7

      - name: Assemble portable bundle
        shell: pwsh
        env:
          PYTHONIOENCODING: utf-8
        run: |
          .\.venv\Scripts\python.exe src\deploy_portable.py --allow-missing-installer
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::deploy_portable.py failed"; exit 1 }
          Write-Host "Portable bundle ready -> dist\Koto_Portable\"

      - name: Install Inno Setup (if missing)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            winget install --id JRSoftware.InnoSetup --silent --accept-source-agreements --accept-package-agreements
            if ($LASTEXITCODE -ne 0) { choco install innosetup -y --no-progress }
          }

      - name: Build installer (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { $iscc = "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe" }
          if (-not (Test-Path $iscc)) { Write-Host "::error::Inno Setup 6 not found"; exit 1 }
          & $iscc /DAppVersion=$env:VERSION koto_installer.iss
          if ($LASTEXITCODE -ne 0) { Write-Host "::error::Inno Setup build failed"; exit 1 }
          $setupName = "Koto_v$($env:VERSION)_Setup.exe"
          "SETUP_NAME=$setupName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $sizeMB = [math]::Round((Get-Item "dist\$setupName").Length / 1MB, 1)
          Write-Host "Installer: $setupName ($sizeMB MB)"

      - name: Compress portable to zip
        shell: pwsh
        run: |
          $zipName = "Koto_v$($env:VERSION)_Windows.zip"
          Compress-Archive -Path "dist\Koto_Portable\*" -DestinationPath "dist\$zipName" -CompressionLevel Optimal
          "ZIP_NAME=$zipName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          $sizeMB = [math]::Round((Get-Item "dist\$zipName").Length / 1MB, 1)
          Write-Host "Zip: $zipName ($sizeMB MB)"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v7
        with:
          name: koto-windows
          path: |
            dist/Koto_v*_Setup.exe
            dist/Koto_v*_Windows.zip
          retention-days: 7

  # ══════════════════════════════════════════════════════════════════════════
  # Job 2: Installer E2E Tests (blocks release on failure)
  # ══════════════════════════════════════════════════════════════════════════
  test-installer:
    name: Installer E2E Tests
    runs-on: windows-latest
    needs: build-windows
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: koto-windows
          path: dist

      - name: Run installer E2E test
        shell: pwsh
        run: |
          $setup = Get-Item "dist\Koto_v*_Setup.exe" | Select-Object -First 1
          if (-not $setup) { Write-Host "::error::Setup EXE not found in dist\"; exit 1 }
          Write-Host "Testing installer: $($setup.FullName)"
          & tests\installer\test_installer_e2e.ps1 `
            -SetupExe $setup.FullName `
            -TestInstallDir "$env:LOCALAPPDATA\KotoCI_E2E" `
            -Port 5099 `
            -HealthTimeoutSec 60 `
            -RequireHealth:$false
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run portable E2E test
        shell: pwsh
        run: |
          $zip = Get-Item "dist\Koto_v*_Windows.zip" | Select-Object -First 1
          if (-not $zip) { Write-Host "::warning::ZIP not found, skipping portable test"; exit 0 }
          Write-Host "Testing portable: $($zip.FullName)"
          & tests\installer\test_portable_e2e.ps1 `
            -ZipFile $zip.FullName `
            -Port 5098 `
            -HealthTimeoutSec 60 `
            -RequireHealth:$false
          if ($LASTEXITCODE -ne 0) { exit 1 }

  # ══════════════════════════════════════════════════════════════════════════
  # Job 3: Docker 镜像构建（推送到 GitHub Container Registry）
  # ══════════════════════════════════════════════════════════════════════════
  build-docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        uses: docker/metadata-action@v6
        id: meta
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: config/deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ══════════════════════════════════════════════════════════════════════════
  # Job 3: 创建 GitHub Release（tag 推送时才运行）
  # ══════════════════════════════════════════════════════════════════════════
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-windows, build-docker, test-installer]
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: koto-windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            Koto_v*_Setup.exe
            Koto_v*_Windows.zip

  # ══════════════════════════════════════════════════════════════════════════
  # Job 4: Sync VERSION file to match released tag
  # ══════════════════════════════════════════════════════════════════════════
  sync-version:
    name: Sync VERSION file
    runs-on: ubuntu-latest
    needs: create-release
    if: github.event_name == 'push'
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update VERSION file and commit
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          echo "$VERSION" > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git diff --cached --quiet || git commit -m "chore: sync VERSION to $VERSION [skip ci]"
          git push origin main