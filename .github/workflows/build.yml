name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    name: Build Windows Package
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller koto.spec --clean -y

      - name: Assemble portable package
        run: python src/deploy_portable.py --allow-missing-installer
        env:
          PYTHONIOENCODING: utf-8

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = Get-Date -Format "yyyy.MM.dd"
          $zipName = "Koto_v${version}_Windows.zip"
          Compress-Archive -Path "dist\Koto_Portable\*" -DestinationPath "dist\$zipName" -CompressionLevel Optimal
          Write-Host "Created: dist\$zipName"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: koto-windows-portable
          path: dist/Koto_v*_Windows.zip
          retention-days: 14
