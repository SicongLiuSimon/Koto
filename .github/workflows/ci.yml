name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: flake8 src/ app/ tests/ --count --show-source --statistics

  test:
    name: Test
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt
          pip install pytest

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest tests/ -v --tb=short -q \
            --ignore=tests/phase2_smoke_test.py \
            --ignore=tests/phase2_test_annotation.py \
            --ignore=tests/phase3_test_converted.py \
            --ignore=tests/phase4_e2e_test.py \
            --ignore=tests/test_annotation.py \
            --ignore=tests/test_bindings_triggers_api.py \
            --ignore=tests/test_e2e_agent.py \
            --ignore=tests/test_integration.py \
            --ignore=tests/test_output_modes.py \
            --ignore=tests/test_phase3_e2e.py \
            --ignore=tests/test_phase3_local.py \
            --ignore=tests/test_ppt_features.py \
            --ignore=tests/test_routing_coverage.py
