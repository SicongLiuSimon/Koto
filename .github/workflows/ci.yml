name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint tools
        run: pip install flake8 black isort bandit

      - name: Run flake8
        run: flake8 src/ app/ tests/ --count --show-source --statistics

      - name: Check formatting (black)
        run: black --check src/ app/ tests/

      - name: Check import order (isort)
        run: isort --check-only --profile black src/ app/ tests/

      - name: Security scan (bandit)
        run: bandit -r app/ src/ -ll -q --exit-zero

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y portaudio19-dev

      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('config/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r config/requirements.txt
          pip install pytest pytest-mock pytest-cov

      - name: CVE scan (pip-audit)
        run: |
          pip install pip-audit
          pip-audit --desc || true

      - name: Run tests
        env:
          PYTHONPATH: .
        run: |
          pytest \
            tests/unit/ \
            tests/integration/ \
            tests/test_file_agent.py \
            tests/test_organize_cleanup.py \
            tests/test_organize_dedup.py \
            tests/test_p0_e2e_flow.py \
            tests/test_smart_routing.py \
            tests/test_trigger_params.py \
            tests/test_trigger_params_integration.py \
            tests/test_unified_agent.py \
            -v --tb=short -q \
            --cov=app --cov-report=term-missing --cov-report=xml:coverage.xml \
            --cov-fail-under=48

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 14

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -f config/deploy/Dockerfile -t koto:ci .

      - name: Verify container starts
        run: |
          docker run -d --name koto-ci-test -p 5001:5000 koto:ci
          sleep 15
          docker inspect koto-ci-test --format='{{.State.Status}}'
          docker stop koto-ci-test || true
          docker rm koto-ci-test || true
