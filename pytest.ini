[pytest]
testpaths =
    tests/unit
    tests/integration
    tests/test_file_agent.py
    tests/test_organize_cleanup.py
    tests/test_organize_dedup.py
    tests/test_p0_e2e_flow.py
    tests/test_smart_routing.py
    tests/test_trigger_params.py
    tests/test_trigger_params_integration.py
    tests/test_unified_agent.py
pythonpath = .
log_cli = true
log_cli_level = INFO
log_level = INFO

markers =
    unit: fast, isolated unit tests (no network, no real LLM)
    integration: tests using Flask test client against in-process app
    e2e: end-to-end tests that require a live running server (skipped in CI by default)
    slow: tests that take more than a few seconds

cache_dir = .pytest_cache_local
addopts = -v --tb=short -q --basetemp=.pytest_tmp --reruns=2 --reruns-delay=1
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
