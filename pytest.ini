[pytest]
testpaths = tests
pythonpath = .
log_cli = true
log_cli_level = INFO
log_level = INFO

markers =
    unit: fast, isolated unit tests (no network, no real LLM)
    integration: tests using Flask test client against in-process app
    e2e: end-to-end tests that require a live running server (skipped in CI by default)
    slow: tests that take more than a few seconds

addopts = -v --tb=short -q
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
